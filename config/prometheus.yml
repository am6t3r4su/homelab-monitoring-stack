global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: proxmox-node
    static_configs:
      - targets:
          - <PROXMOX_IP>:9100

  - job_name: obs-node
    static_configs:
      - targets:
          - 127.0.0.1:9100

  - job_name: pve-exporter
    metrics_path: /pve
    params:
      module: [default]
      target: [<PROXMOX_IP>]
    static_configs:
      - targets:
          - 127.0.0.1:9221
